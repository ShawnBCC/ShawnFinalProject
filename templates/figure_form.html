<form class="record-form" method="POST">
  <label>Name</label>
  <input type="text" name="name" required value="{{ figure.name if figure else '' }}">

  <label>Clan</label>
  <input type="text" name="clan" required value="{{ figure.clan if figure else '' }}">

  <label>Material</label>
  <input type="text" name="material" value="{{ figure.material if figure else 'Metal, Plastic' }}">

  <label>Height in cm</label>
  <input type="number" step="0.01" name="height_cm" value="{{ figure.height_cm if figure else '21.00' }}">

  <label>Price</label>
  <input type="number" step="0.01" name="price" value="{{ figure.price if figure else '45.00' }}">

  <label>Quantity</label>
  <input type="number" name="quantity" value="{{ figure.quantity if figure else '1' }}">

  <label>Image File</label>
  <select name="image_file">
    {% for img in ['samurai1.jpg','samurai2.jpg','samurai3.jpg','samurai4.jpg','samurai5.jpg','samurai6.jpg'] %}
      <option value="{{ img }}" {% if figure and figure.image_file == img %}selected{% endif %}>{{ img }}</option>
    {% endfor %}
  </select>

  <label>Description</label>
  <textarea name="description" rows="5">{{ figure.description if figure else '' }}</textarea>

  <button type="submit">Save Record</button>
  <a class="btn" href="{{ url_for('inventory') }}">Cancel</a>
</form>
